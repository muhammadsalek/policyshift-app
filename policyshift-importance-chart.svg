<svg width="760" height="320" viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <rect width="760" height="320" fill="#0d1117" rx="14"/>
  <text x="30" y="35" font-family="Verdana, Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="bold">🤖 Random Forest — Variable Importance (illustrative)</text>
  <text x="30" y="55" font-family="Verdana, Arial, sans-serif" font-size="11" fill="#9ca3af">Mean decrease in Gini · relative ranking of policy-relevant predictors</text>

  <g font-family="Verdana, Arial, sans-serif" font-size="12" fill="#e5e7eb">

    <!-- Row 1 -->
    <text x="30" y="95">Decision-making autonomy</text>
    <rect x="260" y="82" width="0" height="18" rx="4" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="440" dur="1.4s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <text x="710" y="95" fill="#00d4ff" font-weight="bold">100%</text>

    <!-- Row 2 -->
    <text x="30" y="135">Internet / media access</text>
    <rect x="260" y="122" width="0" height="18" rx="4" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="370" dur="1.4s" begin="0.15s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <text x="640" y="135" fill="#00d4ff" font-weight="bold">84%</text>

    <!-- Row 3 -->
    <text x="30" y="175">Household wealth quintile</text>
    <rect x="260" y="162" width="0" height="18" rx="4" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="320" dur="1.4s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <text x="590" y="175" fill="#00d4ff" font-weight="bold">73%</text>

    <!-- Row 4 -->
    <text x="30" y="215">Urban / rural residence</text>
    <rect x="260" y="202" width="0" height="18" rx="4" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="260" dur="1.4s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <text x="530" y="215" fill="#00d4ff" font-weight="bold">59%</text>

    <!-- Row 5 -->
    <text x="30" y="255">Maternal age group</text>
    <rect x="260" y="242" width="0" height="18" rx="4" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="200" dur="1.4s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <text x="470" y="255" fill="#00d4ff" font-weight="bold">45%</text>

    <!-- Row 6 -->
    <text x="30" y="295">Region / province</text>
    <rect x="260" y="282" width="0" height="18" rx="4" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="140" dur="1.4s" begin="0.75s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <text x="410" y="295" fill="#00d4ff" font-weight="bold">32%</text>

  </g>
</svg>
